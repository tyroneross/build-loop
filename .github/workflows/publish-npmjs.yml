name: Publish @tyroneross/build-loop to npmjs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run 'npm publish --dry-run' instead of publishing"
        required: false
        default: "true"
      verify_only:
        description: "Only verify npmjs metadata for the package.json version"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@tyroneross"
          package-manager-cache: false

      - name: Use npm 11
        run: npm install -g npm@11

      - name: Verify npm
        run: npm --version

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Check npmjs version
        id: npmjs_version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@tyroneross/build-loop@$PKG_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@tyroneross/build-loop@$PKG_VERSION already exists on npmjs"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "@tyroneross/build-loop@$PKG_VERSION is not published on npmjs"
          fi

      - name: Install dependencies
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.verify_only != 'true') && (github.event_name != 'release' || steps.npmjs_version.outputs.exists != 'true')
        run: npm ci

      - name: Build
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.verify_only != 'true') && (github.event_name != 'release' || steps.npmjs_version.outputs.exists != 'true')
        run: npm run build

      - name: Publish to npmjs (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.verify_only != 'true' && github.event.inputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run --provenance --access public --registry=https://registry.npmjs.org

      - name: Publish to npmjs
        if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.verify_only != 'true' && github.event.inputs.dry_run != 'true')) && steps.npmjs_version.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org

      - name: Skip npmjs publish
        if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.verify_only != 'true' && github.event.inputs.dry_run != 'true')) && steps.npmjs_version.outputs.exists == 'true'
        run: echo "Skipping npmjs publish because this version is already present."

      - name: Verify npmjs metadata
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.verify_only == 'true' || github.event.inputs.dry_run != 'true'))
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          for attempt in $(seq 1 12); do
            if npm view "@tyroneross/build-loop@$PKG_VERSION" dist-tags dist.attestations --json --registry=https://registry.npmjs.org; then
              exit 0
            fi
            echo "npmjs metadata not visible yet for $PKG_VERSION; retry $attempt/12"
            sleep 30
          done
          echo "::error::npmjs metadata did not become visible for @tyroneross/build-loop@$PKG_VERSION"
          exit 1
