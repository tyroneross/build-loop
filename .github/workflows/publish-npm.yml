name: Publish @tyroneross/build-loop to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run 'npm publish --dry-run' instead of publishing"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tyroneross"
          always-auth: true

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG)"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Check GitHub Packages version
        id: ghpkg_version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@tyroneross/build-loop@$PKG_VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@tyroneross/build-loop@$PKG_VERSION already exists on GitHub Packages"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "@tyroneross/build-loop@$PKG_VERSION is not published on GitHub Packages"
          fi

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' || steps.ghpkg_version.outputs.exists != 'true'
        run: npm ci

      - name: Build
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' || steps.ghpkg_version.outputs.exists != 'true'
        run: npm run build

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --dry-run

      - name: Publish
        if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')) && steps.ghpkg_version.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish

      - name: Skip GitHub Packages publish
        if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')) && steps.ghpkg_version.outputs.exists == 'true'
        run: echo "Skipping GitHub Packages publish because this version is already present."

      - name: Verify GitHub Packages metadata
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          for attempt in $(seq 1 12); do
            if npm view "@tyroneross/build-loop@$PKG_VERSION" version --registry=https://npm.pkg.github.com; then
              exit 0
            fi
            echo "GitHub Packages metadata not visible yet for $PKG_VERSION; retry $attempt/12"
            sleep 30
          done
          echo "::error::GitHub Packages metadata did not become visible for @tyroneross/build-loop@$PKG_VERSION"
          exit 1
