name: Runtime Memory Guard

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  runtime-memory-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Ensure runtime memory is not tracked
        run: python3 scripts/check_runtime_memory_tracking.py --all
