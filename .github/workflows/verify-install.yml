name: Verify @tyroneross/build-loop install

# Smoke-tests the consumer install path against GitHub Packages.
# Auto-runs after every successful publish; can also be triggered manually
# for any version. Uses GITHUB_TOKEN (auto-granted packages:read), so no PAT.

on:
  workflow_run:
    workflows: ["Publish @tyroneross/build-loop to GitHub Packages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to verify (omit to use current package.json)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    # If chained from publish, only run when the publish succeeded.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version to verify
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Verifying @tyroneross/build-loop@$V"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@tyroneross"
          always-auth: true

      # GitHub Packages can lag the publish API by 30-60s. Only wait when
      # we're chained after the publish workflow.
      - name: Wait for GitHub Packages propagation
        if: github.event_name == 'workflow_run'
        run: sleep 45

      - name: Sandbox install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify && cd /tmp/verify
          npm init -y >/dev/null
          npm install "@tyroneross/build-loop@${{ steps.ver.outputs.version }}"

          # Read the manifest directly. require() would fail because the
          # package's `exports` field doesn't expose ./package.json.
          INSTALLED=$(jq -r .version node_modules/@tyroneross/build-loop/package.json)
          if [ "$INSTALLED" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Installed version ($INSTALLED) does not match requested (${{ steps.ver.outputs.version }})"
            exit 1
          fi

          # Prove the tarball actually shipped real files, not just a manifest.
          FILE_COUNT=$(find node_modules/@tyroneross/build-loop -type f | wc -l | tr -d ' ')
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "::error::Suspiciously small install — only $FILE_COUNT files in node_modules"
            exit 1
          fi

          PKG="node_modules/@tyroneross/build-loop"
          for REQUIRED in \
            "scripts/install_memory.py" \
            "templates/memory/MEMORY.md.template" \
            "templates/memory/constitution.md.template" \
            "scripts/memory_context/__init__.py" \
            "scripts/memory_graph/__init__.py" \
            "scripts/semantic_index/__init__.py" \
            "scripts/sync_navgator_lessons.py"
          do
            if [ ! -e "$PKG/$REQUIRED" ]; then
              echo "::error::Installed package missing $REQUIRED"
              exit 1
            fi
          done

          MEMORY_ROOT=$(mktemp -d)
          python3 "$PKG/scripts/install_memory.py" --dest "$MEMORY_ROOT" --ensure-project fresh-install
          test -f "$MEMORY_ROOT/MEMORY.md"
          test -f "$MEMORY_ROOT/constitution.md"
          test -d "$MEMORY_ROOT/indexes"
          test -d "$MEMORY_ROOT/projects/fresh-install/raw/files"

          mkdir -p "$MEMORY_ROOT/projects/fresh-install/context"
          printf '# Fresh install context\n\nPackage bootstrap smoke.\n' > "$MEMORY_ROOT/projects/fresh-install/context/CONTEXT.md"
          mkdir -p /tmp/verify-app
          BUILD_LOOP_MEMORY_STORE_ROOT="$MEMORY_ROOT" \
            python3 "$PKG/scripts/blm.py" context \
              --workdir /tmp/verify-app \
              --project fresh-install \
              --query "bootstrap" \
              --mode expand \
              --json > /tmp/verify-context.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/verify-context.json").read_text())
          assert data["current"]["project"] == "fresh-install"
          assert data["current"]["context"]["exists"] is True
          assert "graph" in data.get("expansion", {})
          PY

          echo "::notice::Verified @tyroneross/build-loop@$INSTALLED — $FILE_COUNT files installed"
