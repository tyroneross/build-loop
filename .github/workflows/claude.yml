name: Claude Code

# Responds when someone types "@claude ..." in an issue comment, a PR review
# comment, a PR review body, or a new issue. Requires:
#   1. The Claude GitHub App installed on this repo (github.com/apps/claude)
#   2. Repo secret ANTHROPIC_API_KEY set (Settings -> Secrets and variables -> Actions)
# Until both exist this workflow is inert (it only acts on an explicit @claude mention).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when the trigger text actually mentions @claude (avoids wasted runs).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
